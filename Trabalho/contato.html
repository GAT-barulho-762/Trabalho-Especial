<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Básica - Contato</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <header class="site-header">
        <h1>CALCULADORA BÁSICA</h1>
        <nav class="footer-navs">
            <a href="index.html" class="site-nav">Página Principal</a>
            <a href="sobre.html" class="site-nav">Sobre Nós</a>
        </nav>
        <button id="btn-tema" aria-label="Alternar tema">🌙</button>
    </header>

    <main class="main-container">
        <div class="content-area">
            
            <section class="site-section">
                <h2>Fale Conosco</h2>
                
                <article class="site-article" style="background: none; border: none; padding: 0;">
                    <form id="form-contato">
                        <div class="form-grupo">
                            <label for="nome">Nome:</label>
                            <input type="text" id="nome" placeholder="Digite seu nome completo">
                        </div>
                        
                        <div class="form-grupo">
                            <label for="email">E-mail:</label>
                            <input type="email" id="email" placeholder="seu-email@dominio.com">
                        </div>

                        <div class="form-grupo">
                            <label for="assunto">Assunto:</label>
                            <input type="text" id="assunto" placeholder="Ex: Dúvida, Sugestão, Parceria">
                        </div>

                        <div class="form-grupo">
                            <label for="mensagem">Mensagem:</label>
                            <textarea id="mensagem" rows="5" placeholder="Escreva sua mensagem detalhadamente..."></textarea>
                        </div>

                        <button type="submit" class="btn-enviar">Enviar Mensagem</button>
                    </form>
                </article>
            </section>

            <section class="site-section">
                <h2>Nossa Localização</h2>
                
                <article class="site-article" style="background: none; border: none; padding: 0;">
                    <div class="video-container">
                        <iframe 
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3674.347395270501!2d-43.128795523788094!3d-22.89965003734005!2m3!1f0!2f0!3f0!3m2!1i1020!2i768!4f13.1!3m3!1m2!1s0x997ec18fa46e8f%3A0xc3f8e581e6587c4d!2sPlaza%20Shopping%20Niter%C3%B3i!5e0!3m2!1spt-BR!2sbr!4v1715000000000!5m2!1spt-BR!2sbr" 
                            style="border:0;" 
                            allowfullscreen="" 
                            loading="lazy" 
                            referrerpolicy="no-referrer-when-downgrade">
                        </iframe>
                    </div>
                </article>
            </section>
        </div>

        <aside class="site-aside">
            <p><strong>Canais de Atendimento:</strong><br><br>• Segunda a Sexta<br>• 08:00 às 18:00<br><br>Retornamos o seu contato em até 24 horas úteis.</p>
        </aside>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 - Conteúdo Educacional. Direitos autorais reservados.</p>
        <div class="footer-navs">
            <nav>
                <a href="index.html" class="site-nav">Página Principal</a>
                <a href="sobre.html" class="site-nav">Sobre Nós</a>
            </nav>
        </div>
    </footer>

    <script src="comandos.js"></script> 
    
</body>
    
</html>
